# lamill.toml — per-site config consumed by lamill (portfolio/ops) and rankmill (content/audits).
# [content] = stable identity, authored by hand. [todo] = volatile work state.
# rankmill output lives in sites/<domain>/rankmill-output/, not here.

schema = "lamill-toml-v1"

[deploy]
platform = "cf-pages"
production_branch = "main"
custom_domains = [
    "threadradar.xyz",
]

[stack]
framework = "astro"

# Tracked todos for threadradar.xyz. status: "done" | "open".
[[todo]]
status = "done"
task = "Fill in [content] block (site_type, primary_keyword, icp, …)"

[[todo]]
status = "open"
priority = "medium"
task = "Check SEO: GSC indexation + coverage (revisit ~2026-06-14)"

[[todo]]
status = "open"
priority = "medium"
task = "Verify GA4 is receiving data (check Realtime after first traffic)"

[[todo]]
status = "open"
priority = "low"
task = "Confirm GSC verification + sitemap submitted (re-run deploy if it timed out)"

[content]
# Declarative content identity for this site.
# Authored by the human; consumed by rankmill to generate drafts and run audits.
# Leave fields empty until you have a deliberate answer. Empty is better than wrong.
site_type = "tool"
primary_keyword = "brand Reddit pulse"
secondary_keywords = [
    "community intelligence",
    "weekly community briefing",
    "Reddit listening tool",
    "Discord monitoring",
    "community sentiment analysis",
    "fractional CMO tools",
]
icp = "The core ICP is an independent fractional CMO running a portfolio of 3–5 consumer or prosumer brand engagements — typically charging $5K–15K/month per client and serving DTC, SaaS, creator-economy, or community-driven businesses. They're a team of one, allergic to dashboards, and graded on whether they sound smart on weekly client calls. They've tried Brandwatch, Sprout, or Sparktoro and bounced off the price and the analyst-required learning curve. They already lurk in client subreddits and Discords manually, know exactly which communities matter, and would happily pay $150/brand to stop. Secondary ICPs: in-house growth leads at sub-$10M brands without a research function, and boutique brand strategy consultancies running similar multi-client setups."
urgency_trigger = "Upcoming Monday client calls — need to sound prescient without spending hours monitoring communities"
penalty = "Continue spending 5+ hours/week manually lurking, miss emerging community signals, and risk sounding unprepared on weekly client calls"
tone = "practical, direct, operator-focused"
law = ""                  # statute or regulation if applicable, else empty
